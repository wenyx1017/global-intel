# 大模型配置文件

# 默认提供商
default_provider: siliconflow

# 频率限制
rate_limits:
  min_interval: 3600          # 最小间隔（秒），默认 1 小时
  max_calls_per_day: 24       # 每日最大调用次数
  budget_per_day: 10.0        # 每日预算（美元）

# 提供商配置
providers:
  # 硅基流动（中国）
  siliconflow:
    enabled: true
    api_key: sk-ljoljoulwntsonxkffkhqfrsuhljaomkcckarvgdatmdzzls
    base_url: https://api.siliconflow.cn/v1
    model: Qwen/Qwen2.5-72B-Instruct
    temperature: 0.1
    max_tokens: 4096
    
  # 通义千问（备用）
  qwen:
    enabled: false
    api_key: ${DASHSCOPE_API_KEY}
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen-plus
    temperature: 0.1
    max_tokens: 4096
    
  # OpenAI（备用）
  openai:
    enabled: false
    api_key: ${OPENAI_API_KEY}
    base_url: https://api.openai.com/v1
    model: gpt-4o-mini
    temperature: 0.1
    max_tokens: 4096

# 任务配置
tasks:
  # 图谱验证
  graph_validation:
    enabled: true
    schedule: "0 */12 * * *"  # 每 12 小时
    provider: siliconflow
    
  # 关联验证
  relation_validation:
    enabled: true
    schedule: "0 */6 * * *"   # 每 6 小时
    provider: siliconflow
    
  # 报告生成
  report_generation:
    enabled: true
    schedule: "0 8 * * *"     # 每天 8 点
    provider: siliconflow
    report_types:
      - daily
      - weekly
