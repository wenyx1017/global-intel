# 信源配置 - 详细信息
# Source Configuration - Detailed Information

# ==================== 第一手信源（S 级） ====================
primary_sources:
  # 政治类
  - id: whitehouse
    name: "白宫"
    url: "https://www.whitehouse.gov/briefings-statements/"
    type: "rss"
    category: "politics"
    country: "US"
    language: "en"
    reliability_score: 95
    update_interval: 300  # 5 分钟
    active: true
  
  - id: gov_cn
    name: "中国政府网"
    url: "http://www.gov.cn/guowuyuan/gb/content.htm"
    type: "crawler"
    category: "politics"
    country: "CN"
    language: "zh"
    reliability_score: 95
    update_interval: 600  # 10 分钟
    active: true
    crawler_config:
