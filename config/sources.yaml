# ==================== 信源分类统计 ====================
categories:
  politics:
    count: 2
    update_frequency: "5-10 分钟"
  
  economy:
    count: 2
    update_frequency: "15 分钟"
  
  finance:
    count: 7
    update_frequency: "15-30 分钟"
  
  energy:
    count: 2
    update_frequency: "30 分钟"
  
  technology:
    count: 4
    update_frequency: "30-60 分钟"
  
  news:
    count: 3
    update_frequency: "30 分钟"

# ==================== 信源评价规则 ====================
evaluation_rules:
  # 准确性评价
  accuracy:
    method: "cross_validation"
    min_sources: 3
    weight: 0.30
  
  # 真实性评价
  authenticity:
    checks:
      - domain_verification
      - author_verification
      - citation_check
    weight: 0.25
  
  # 客观性评价
  objectivity:
    method: "sentiment_analysis"
    bias_detection: true
    weight: 0.25
  
  # 重大性评价
  importance:
    metrics:
      - citation_count
      - social_shares
      - follow_up_reports
    weight: 0.20

# ==================== 信源管理 ====================
management:
  auto_add: true
  auto_remove: true
  min_score_threshold: 70
  evaluation_frequency: "0 0 * * *"  # 每天凌晨
  notification_on_change: true
