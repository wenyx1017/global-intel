# 实体类型定义
# Entity Type Definitions for Global Intelligence System

entity_types:
  # 国家/地区
  - name: GPE
    label: 国家/地区
    description: 国家、地区、行政区域
    examples:
      - 中国
      - 美国
      - 欧盟
      - 台湾
      - 香港
    
  # 政府机构
  - name: GOV_ORG
    label: 政府机构
    description: 政府部门、机构、委员会
    examples:
      - 国务院
      - 财政部
      - 美联储
      - 发改委
      - 证监会
    
  # 公司/组织
  - name: ORG
    label: 公司/组织
    description: 企业、公司、非政府组织、机构
    examples:
      - 阿里巴巴
      - 腾讯
      - 世界银行
      - IMF
      - 高盛
    
  # 人物
  - name: PERSON
    label: 人物
    description: 个人姓名、职位人物
    examples:
      - 习近平
      - 拜登
      - 马斯克
      - 财长耶伦
    
  # 事件
  - name: EVENT
    label: 事件
    description: 重要事件、会议、活动
    examples:
      - 两会
      - 达沃斯论坛
      - 中美贸易战
      - 奥运会
    
  # 政策/法规
  - name: LAW_POLICY
    label: 政策/法规
    description: 法律、法规、政策、条例
    examples:
      - 十四五规划
      - 碳中和政策
      - GDPR
      - 外商投资法

# 实体标准化映射
normalization_rules:
  # 国家/地区标准化
  GPE:
    aliases:
      中国大陆: 中国
      大陆: 中国
      USA: 美国
      美国: 美国
      美利坚合众国: 美国
      UK: 英国
      英国: 英国
      大不列颠: 英国
      EU: 欧盟
      欧州联盟: 欧盟
    
  # 政府机构标准化
  GOV_ORG:
    aliases:
      国务院: 中国国务院
      发改委: 国家发展和改革委员会
      央行: 中国人民银行
      美联储: 美国联邦储备系统
      证监会: 中国证券监督管理委员会
    
  # 公司/组织标准化
  ORG:
    aliases:
      阿里: 阿里巴巴
      腾讯控股: 腾讯
      谷歌: Google
      谷歌: Alphabet
      脸书: Meta
      推特: X

# 去重规则
deduplication:
  # 基于标准化后的名称去重
  strategy: normalized_name
  # 忽略大小写
  case_insensitive: true
  # 忽略空格和标点
  ignore_punctuation: true
  # 相似度阈值 (用于模糊匹配)
  similarity_threshold: 0.85
